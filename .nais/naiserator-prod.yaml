apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sokos-oppgjorsrapporter
  namespace: oppgjorsrapporter
  labels:
    team: oppgjorsrapporter
spec:
  image: "{{{ image }}}"
  port: 8080
  replicas:
    min: 2
    max: 2
    cpuThresholdPercentage: 75
  liveness:
    path: /internal/isAlive
    initialDelay: 5
    timeout: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/isReady
    initialDelay: 5
    periodSeconds: 5
    timeout: 5
  resources:
    limits:
      memory: 4096Mi
    requests:
      cpu: 100m
      memory: 512Mi
  ingresses:
    - https://sokos-oppgjorsrapporter.intern.nav.no
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
  azure:
    application:
      enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: logging
          namespace: nais-system

  env:
    - name: PILOT_PROD_ORGNRS # Hentet fra https://confluence.adeo.no/spaces/TOB/pages/791029635/TOB-6273+-+Orgnr+som+skal+v%C3%A6re+med+i+pilot-produksjon
      value: >-
        874652202,
        889640782,
        891046642,
        974237059,
        974239965,
        974241730,
        974242931,
        974652269,
        974652277,
        974652285,
        974652293,
        974652358,
        974789310,
        975605779,
        991013628,
        991076573,
        991078045,
        993110469,
        995277670,
        999263550,
