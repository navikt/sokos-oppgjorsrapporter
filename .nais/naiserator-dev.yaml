apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sokos-oppgjorsrapporter
  namespace: oppgjorsrapporter
  labels:
    team: oppgjorsrapporter
spec:
  image: "{{{ image }}}"
  port: 8080
  replicas:
    min: 1
    max: 2
    cpuThresholdPercentage: 75
  liveness:
    path: /internal/isAlive
    initialDelay: 5
    timeout: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/isReady
    initialDelay: 5
    periodSeconds: 5
    timeout: 5
  resources:
    limits:
      memory: 4096Mi
    requests:
      cpu: 100m
      memory: 512Mi
  ingresses:
    - https://sokos-oppgjorsrapporter.intern.dev.nav.no
    - https://sokos-oppgjorsrapporter.ekstern.dev.nav.no
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
  azure:
    application:
      enabled: true
      allowAllUsers: false
      claims:
        groups:
          - id: "9c5b24f2-5e01-4966-adaf-bc9fb6410a32" # 0000-CA-SOKOS-MF-OPPGJORSRAPPORTER
          - id: "f5073e28-eb3d-49f0-af1e-32066f422936" # 0000-CA-SOKOS-MF-OPPGJORSRAPPORTER-ADMIN
          - id: "ad006b47-99b5-465d-91da-a02a216e6b4c" # 0000-CA-SOKOS-MF-OPPGJORSRAPPORTER-REF-ARBG
          - id: "c7e60dc9-8ad9-405e-94b2-5fab77a3b6a4" # 0000-CA-SOKOS-MF-OPPGJORSRAPPORTER-TREKK-HEND
          - id: "8494d744-e7ad-4737-b785-f7754e0fa7a5" # 0000-CA-SOKOS-MF-OPPGJORSRAPPORTER-TREKK-KRED
  maskinporten:
    enabled: true
    scopes:
      exposes:
        - accessibleForAll: true
          atMaxAge: 600 # OK med lang token-levetid i dev
          enabled: true
          product: utbetaling
          separator: "/"
          name: oppgjorsrapporter
      consumes:
        - name: "altinn:authorization/authorize"
        - name: "digdir:dialogporten.serviceprovider"
  tokenx:
    enabled: true
  gcp:
    sqlInstances:
      - type: POSTGRES_18
        tier: db-f1-micro
        diskAutoresize: true
        databases:
          - name: sokos-oppgjorsrapporter-db
            users:
              - name: appbruker
  accessPolicy:
    inbound:
      rules:
        - application: azure-token-generator
          namespace: nais
          cluster: dev-gcp
        - application: sokos-up-oppgjorsrapporter
        - application: sokos-oppgjorsrapporter-selvbetjening-frontend
    outbound:
      external:
        - host: platform.tt02.altinn.no
        - host: mqls01.preprod.local
          ports:
            - port: 1413
        - host: ereg-services-q1.dev-fss-pub.nais.io
      rules:
        - application: logging
          namespace: nais-system
        - application: ereg-services-q1
          namespace: arbeidsforhold
          cluster: dev-fss
        - application: pengeflyt-pdfgen
        - application: pengeflyt-pdfgenrs
        - application: populasjonstilgangskontroll
          namespace: tilgangsmaskin
  envFrom:
    - secret: altinn-authorization-subscription
    - secret: sokos-oppgjorsrapporter-secrets
  env:
    - name: APPLICATION_PROFILE
      value: DEV
    - name: MQ_HOST
      value: mqls01.preprod.local
    - name: MQ_PORT
      value: "1413"
    - name: MQ_MANAGER_NAME
      value: MQLS01
    - name: MQ_CHANNEL
      value: Q1_OPPGJORSRAPPORTER
    - name: MQ_REFUSJON_QUEUE
      value: QA.Q1_OPPGJORSRAPPORTER.REFUSJON_ARBG_GRLAG
    - name: MQ_TREKKHENDELSER_QUEUE
      value: QA.Q1_OPPGJORSRAPPORTER.TREKK_HEND_GRLAG
    - name: MQ_TREKKOPPGJOR_QUEUE
      value: QA.Q1_OPPGJORSRAPPORTER.TREKK_KRED_GRLAG
    - name: EREG_URL
      value: https://ereg-services-q1.dev-fss-pub.nais.io/
    - name: PDF_GENERATOR_URL
      value: http://pengeflyt-pdfgen
    - name: PDFRS_GENERATOR_URL
      value: http://pengeflyt-pdfgenrs
    - name: OPPGJORSRAPPORT_GUI_URL
      # Må matche ingress i https://github.com/navikt/sokos-oppgjorsrapporter-selvbetjening-frontend/blob/main/.nais/naiserator-dev.yaml
      # OBS: '/' på slutten av pathen her er viktig, slik at URI#resolve med relativ path gjør ting riktig
      value: https://www.ekstern.dev.nav.no/oppgjorsrapporter/
    - name: OPPGJORSRAPPORT_API_URL
      value: https://sokos-oppgjorsrapporter.ekstern.dev.nav.no/
    - name: OPPGJORSRAPPORTER_ADMIN_GROUP_UUID
      value: f5073e28-eb3d-49f0-af1e-32066f422936
    - name: OPPGJORSRAPPORTER_REF_ARBG_UUID
      value: ad006b47-99b5-465d-91da-a02a216e6b4c
    - name: OPPGJORSRAPPORTER_TREKK_HEND_UUID
      value: c7e60dc9-8ad9-405e-94b2-5fab77a3b6a4
    - name: OPPGJORSRAPPORTER_TREKK_KRED_UUID
      value: 8494d744-e7ad-4737-b785-f7754e0fa7a5
    - name: NAV_ORGNRS # Hentet fra https://confluence.adeo.no/spaces/TOB/pages/791029635/TOB-6273+-+Orgnr+som+skal+v%C3%A6re+med+i+pilot-produksjon
      value: >-
        874652202,
        889640782,
        891046642,
        974237059,
        974239965,
        974241730,
        974242931,
        974652269,
        974652277,
        974652285,
        974652293,
        974652358,
        974789310,
        975605779,
        991013628,
        991076573,
        991078045,
        993110469,
        995277670,
        999263550,
    - name: TILGANGSMASKINEN_URL
      value: http://populasjonstilgangskontroll.tilgangsmaskin
    - name: TARGET_TILGANGSMASKINEN
      value: dev-gcp:tilgangsmaskin:populasjonstilgangskontroll
