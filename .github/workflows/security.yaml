name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write
  actions: read

env:
  ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}
  ORG_GRADLE_PROJECT_kotlin_daemon_jvmargs: "-Xmx4g"

jobs:
  security-analyze-code:
    name: Security analyze
    if: success() || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: navikt/pengeflyt-gha-workflows/.github/workflows/security.yaml@main
    secrets: inherit
    with:
      team: oppgjorsrapporter
      language: "kotlin"
