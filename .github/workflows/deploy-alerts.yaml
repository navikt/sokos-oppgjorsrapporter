name: Deploy alerts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .nais/alert*
      - .github/workflows/deploy-alerts.yaml

jobs:
  deploy-alerts:
    name: Deploy to cluster
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    strategy:
      matrix:
        cluster: [ dev-gcp, prod-gcp ]

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

#      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
#        env:
#          CLUSTER: ${{ matrix.cluster }}
#          RESOURCE: .nais/alertmanager.yaml
#          VARS: .nais/alertmanager-${{matrix.cluster}}.json
#          PRINT_PAYLOAD: true

      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # v2
        env:
          CLUSTER: ${{ matrix.cluster }}
          RESOURCE: .nais/alerterator.yaml
          VARS: .nais/alerterator-${{ matrix.cluster }}.json
          PRINT_PAYLOAD: true
